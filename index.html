<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科大守卫战 - 沉浸重制版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <section class="viewport">
      <canvas id="game" width="1180" height="720"></canvas>

      <div id="hud" class="hud-bar hidden">
        <div class="hud-item"><span class="icon">❤️</span><strong id="life">20</strong></div>
        <div class="hud-item"><span class="icon">⚡</span><strong id="resource">120</strong></div>
        <div class="hud-item"><span class="icon">🌊</span><strong id="wave">0/10</strong></div>
        <div class="hud-item"><span class="icon">🎯</span><strong id="kills">0</strong></div>
        <div class="hud-item"><span class="icon">🏆</span><strong id="score">0</strong></div>
        <div class="hud-item"><span class="icon">🎓</span><strong id="credits">0</strong></div>
        <button id="pauseBtn" class="hud-btn">暂停 (Space)</button>
        <button id="abortBtn" class="hud-btn danger">撤退</button>
      </div>

      <div id="screenOverlay" class="screen-overlay"></div>

      <div id="buildPanel" class="build-bubble hidden"></div>

      <div id="hotbar" class="hotbar-panel hidden">
        <div class="hotbar-title">防线部署 (快捷键: 1-4)</div>
        <div class="hotbar-slots"></div>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
