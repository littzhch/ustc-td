<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>科大守卫战 - 沉浸重制版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <section class="viewport">
      <canvas id="game" width="1180" height="720"></canvas>

      <div id="hud" class="hud-bar hidden">
        <div class="hud-item"><span class="icon gpa-icon"><img class="hud-icon-img" src="assets/ui/icon_hp.png" alt=""><span>GPA</span></span><strong id="life">4.3</strong></div>
        <div class="hud-item"><span class="icon">⚡</span><strong id="resource">120</strong></div>
        <div class="hud-item"><span class="icon"><img class="hud-icon-img" src="assets/ui/icon_wave.png" alt="波次"></span><strong id="wave">0/10</strong></div>
        <div class="hud-xp">
          <span>强化</span>
          <div class="xp-track"><i id="enhanceXpBar"></i></div>
          <strong id="enhanceXpText">0/140</strong>
        </div>
        <div class="hud-item"><span class="icon">🎯</span><strong id="kills">0</strong></div>
        <div class="hud-item"><span class="icon">🏆</span><strong id="score">0</strong></div>
        <div class="hud-item"><span class="icon">🎓</span><strong id="credits">0</strong></div>
        <button id="saveBtn" class="hud-btn">存档</button>
        <button id="pauseBtn" class="hud-btn has-icon"><img class="btn-icon" src="assets/ui/icon_pause.png" alt="">暂停 (Space)</button>
        <button id="abortBtn" class="hud-btn danger">撤退</button>
      </div>

      <div id="screenOverlay" class="screen-overlay"></div>

      <div id="buildPanel" class="build-bubble hidden"></div>

      <div id="hotbar" class="hotbar-panel hidden">
        <div class="hotbar-title">防线部署 (快捷键: 1-4)</div>
        <div class="hotbar-slots"></div>
      </div>
    </section>
  </main>
  <script src="js/core.js"></script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/systems.js"></script>
  <script src="js/render.js"></script>
  <script src="js/input.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
