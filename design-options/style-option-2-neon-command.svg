<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">方案二：霓虹指挥屏</title>
  <desc id="desc">深色战术屏风格，所有地块、道路、建筑、部署点与特效均用确定坐标绘制，可在代码中一比一复刻。</desc>
  <defs>
    <linearGradient id="ground2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071317"/>
      <stop offset="0.55" stop-color="#10282e"/>
      <stop offset="1" stop-color="#071016"/>
    </linearGradient>
    <filter id="cyanGlow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
